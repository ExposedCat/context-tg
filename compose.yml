services:
  bot:
    build:
      context: .
    image: context-tg-bot:latest
    working_dir: /app
    command:
      - deno
      - run
      - --allow-run
      - --allow-ffi
      - --allow-env
      - --allow-net
      - --allow-read
      - --allow-sys
      - --allow-write
      - --allow-import=cdn.skypack.dev,jsr.io,deno.land,registry.npmjs.org
      - --unstable-cron
      - src/app.ts
    env_file:
      - .env
    environment:
      DENO_DIR: /deno-dir
      DEBUG: app:*:warn,app:*:error
      QDRANT_URL: http://qdrant:6333
      TZ: Europe/Prague
    volumes:
      - .:/app:Z
      - deno_cache:/deno-dir
    depends_on:
      - qdrant
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    environment:
      QDRANT__LOG_LEVEL: WARN
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  deno_cache:
  qdrant_data:
